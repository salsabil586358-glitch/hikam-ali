<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>حِكَم الإمام علي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1d4ed8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="حِكَم علي"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{min-height:100vh;background:#eff6ff;color:#1e3a5f;font-family:'Tajawal',sans-serif;direction:rtl;padding-bottom:60px;}
body.dk{background:#0d1117;color:#c9d1d9;}

/* HEADER */
.apphdr{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid #bfdbfe;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;}
.dk .apphdr{background:#161b22;border-color:#21262d;}
.logo{font-family:'Amiri',serif;font-size:19px;color:#1d4ed8;font-weight:700;}
.dk .logo{color:#58a6ff;}
.hdrr{display:flex;align-items:center;gap:10px;}
.dkbtn{background:none;border:1px solid #bfdbfe;border-radius:8px;font-size:17px;cursor:pointer;padding:2px 8px;line-height:1.5;}
.dk .dkbtn{border-color:#30363d;}
.mpill{background:#dbeafe;color:#1d4ed8;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:500;}
.dk .mpill{background:#1f3a5f;color:#58a6ff;}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}

/* HOME */
.home{padding:18px;}
.herocard{background:#fff;border:1px solid #bfdbfe;border-radius:18px;padding:18px;display:flex;align-items:center;gap:16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(59,130,246,0.08);}
.dk .herocard{background:#161b22;border-color:#21262d;box-shadow:none;}
.htitle{font-size:15px;font-weight:700;margin-bottom:2px;}
.dk .htitle{color:#e6edf3;}
.hsub{font-size:13px;color:#64748b;margin-bottom:3px;}
.dk .hsub{color:#8b949e;}
.hdue{font-size:13px;color:#2563eb;font-weight:500;}
.dk .hdue{color:#58a6ff;}
.startbtn{width:100%;padding:15px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;border-radius:14px;font-family:'Tajawal',sans-serif;font-size:17px;font-weight:700;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 16px rgba(59,130,246,0.35);transition:transform .15s;}
.startbtn:hover:not(:disabled){transform:translateY(-2px);}
.startbtn:disabled{opacity:.5;cursor:not-allowed;}
.srow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.schip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid #bfdbfe;border-radius:20px;padding:4px 11px;}
.dk .schip{background:#161b22;border-color:#21262d;}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sname{font-size:12px;color:#475569;}
.dk .sname{color:#8b949e;}
.scnt{font-size:12px;color:#1d4ed8;font-weight:700;}
.dk .scnt{color:#58a6ff;}
.sectitle{font-size:12px;color:#94a3b8;letter-spacing:1px;margin-bottom:9px;}
.hlist{display:flex;flex-direction:column;gap:7px;}
.hrow{background:#fff;border:1px solid #e0f0ff;border-radius:12px;padding:13px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:border-color .15s;}
.dk .hrow{background:#161b22;border-color:#21262d;}
.hrow:hover{border-color:#93c5fd;}
.dk .hrow:hover{border-color:#388bfd;}
.hrdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.hrbody{flex:1;min-width:0;}
.hrtext{font-family:'Amiri',serif;font-size:15px;color:#1e3a5f;line-height:1.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dk .hrtext{color:#c9d1d9;}
.hrmeta{font-size:11px;color:#94a3b8;margin-top:1px;}
.hrarr{color:#93c5fd;font-size:19px;flex-shrink:0;}

/* DETAIL */
.detsc{padding:18px;}
.detcard{background:#fff;border:1px solid #bfdbfe;border-radius:18px;padding:24px 18px;text-align:center;margin-bottom:12px;box-shadow:0 2px 12px rgba(59,130,246,0.08);}
.dk .detcard{background:#161b22;border-color:#21262d;box-shadow:none;}
.dettheme{font-size:11px;color:#2563eb;letter-spacing:2px;margin-bottom:10px;}
.dk .dettheme{color:#58a6ff;}
.dettext{font-family:'Amiri',serif;font-size:22px;line-height:2;color:#1e3a5f;margin-bottom:14px;}
.dk .dettext{color:#c9d1d9;}
.detbadge{font-size:12px;padding:3px 13px;border-radius:20px;font-weight:500;}

/* SESSION */
.sesc{padding:18px;}
.seshdr{display:flex;align-items:center;gap:9px;margin-bottom:18px;flex-wrap:wrap;}
.sesprog{font-size:13px;color:#64748b;flex-shrink:0;}
.dk .sesprog{color:#8b949e;}
.pgbar{flex:1;min-width:60px;height:6px;background:#dbeafe;border-radius:6px;overflow:hidden;}
.dk .pgbar{background:#21262d;}
.pgfill{height:100%;background:#3b82f6;border-radius:6px;transition:width .4s;}
.hikcard{background:#fff;border:1px solid #bfdbfe;border-radius:16px;padding:18px;margin-bottom:18px;box-shadow:0 2px 8px rgba(59,130,246,0.07);}
.dk .hikcard{background:#161b22;border-color:#21262d;box-shadow:none;}
.hikbadge{display:inline-block;background:#dbeafe;color:#1d4ed8;font-size:11px;border-radius:20px;padding:2px 11px;letter-spacing:1px;margin-bottom:9px;}
.dk .hikbadge{background:#1f3a5f;color:#58a6ff;}
.hiktext{font-family:'Amiri',serif;font-size:21px;line-height:1.9;color:#1e3a5f;}
.dk .hiktext{color:#c9d1d9;}
.hiktext.muted{font-size:14px;color:#94a3b8;font-family:'Tajawal',sans-serif;text-align:center;}

/* QUIZ */
.qbox{display:flex;flex-direction:column;gap:13px;}
.qlbl{font-size:12px;color:#94a3b8;letter-spacing:1px;}
.qtext{font-family:'Amiri',serif;font-size:19px;line-height:1.9;color:#1e3a5f;}
.dk .qtext{color:#c9d1d9;}
.blank{display:inline-block;min-width:56px;border-bottom:2px solid #3b82f6;margin:0 3px;vertical-align:bottom;}
.cw{color:#10b981;font-weight:700;}
.ww{color:#ef4444;font-weight:700;}
.row{display:flex;align-items:center;gap:8px;}
.qinp,.qtxt{flex:1;background:#f0f7ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:10px 13px;color:#1e3a5f;font-family:'Tajawal',sans-serif;font-size:15px;direction:rtl;outline:none;width:100%;}
.dk .qinp,.dk .qtxt{background:#161b22;border-color:#30363d;color:#c9d1d9;}
.qinp:focus,.qtxt:focus{border-color:#3b82f6;background:#fff;}
.dk .qinp:focus,.dk .qtxt:focus{background:#0d1117;border-color:#388bfd;}
.qtxt{resize:none;line-height:1.7;}
.qbtn{background:#3b82f6;border:none;border-radius:10px;padding:10px 17px;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .15s;}
.qbtn:hover{background:#2563eb;}
.dk .qbtn{background:#388bfd;}
.rarea{display:flex;flex-direction:column;gap:11px;}
.rok{color:#10b981;font-size:15px;font-weight:700;}
.rno{color:#ef4444;font-size:15px;font-weight:700;}
.dcard{background:#eff6ff;border-right:3px solid #3b82f6;border-radius:10px;padding:13px 15px;}
.dk .dcard{background:#161b22;border-right-color:#388bfd;}
.dcard.user{background:#f0f9ff;border-right-color:#93c5fd;}
.dk .dcard.user{background:#0d1117;border-right-color:#21262d;}
.dlbl{font-size:11px;color:#2563eb;letter-spacing:1.5px;margin-bottom:7px;}
.dk .dlbl{color:#58a6ff;}
.dtxt{font-size:14px;line-height:1.9;color:#334155;}
.dk .dtxt{color:#8b949e;}
.sitbox{background:#f0f7ff;border-radius:10px;padding:10px 13px;font-size:14px;color:#334155;line-height:1.7;}
.dk .sitbox{background:#161b22;color:#8b949e;}
.sitlbl{color:#2563eb;font-weight:700;}
.dk .sitlbl{color:#388bfd;}
.fb{flex:1;padding:11px;border-radius:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:transform .12s;}
.fb:hover{transform:scale(1.02);}
.fb.easy{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.fb.hard{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5;}
.dk .fb.easy{background:rgba(16,185,129,0.1);color:#3fb950;border-color:rgba(63,185,80,0.3);}
.dk .fb.hard{background:rgba(239,68,68,0.1);color:#f85149;border-color:rgba(248,81,73,0.3);}

/* BACK BTN */
.backbtn{background:none;border:1px solid #bfdbfe;border-radius:8px;color:#2563eb;font-family:'Tajawal',sans-serif;font-size:14px;padding:6px 12px;cursor:pointer;margin-bottom:18px;display:inline-block;transition:background .15s;}
.backbtn:hover{background:#dbeafe;}
.backbtn.sm{margin-bottom:0;font-size:12px;padding:4px 9px;flex-shrink:0;}
.dk .backbtn{color:#58a6ff;border-color:#21262d;}
.dk .backbtn:hover{background:#1f3a5f;}

/* DONE */
.donesc{padding:60px 22px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:13px;}
.donetitle{font-family:'Amiri',serif;font-size:25px;color:#1d4ed8;}
.dk .donetitle{color:#58a6ff;}
.donesub{font-size:14px;color:#64748b;line-height:1.8;max-width:270px;}
.dk .donesub{color:#8b949e;}
.homebtn{margin-top:10px;padding:12px 30px;background:#dbeafe;color:#1d4ed8;border:1px solid #93c5fd;border-radius:12px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:600;cursor:pointer;}
.dk .homebtn{background:#1f3a5f;color:#58a6ff;border-color:#21262d;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="apphdr">
  <span class="logo">حِكَم الإمام علي</span>
  <div class="hdrr">
    <button class="dkbtn" onclick="toggleDark()" id="dkbtn">🌙</button>
    <span class="mpill" id="masteredPill">0 / 98 محفوظة</span>
  </div>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="home">
    <div class="herocard">
      <svg width="72" height="72" viewBox="0 0 72 72" id="progressSvg">
        <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(59,130,246,0.15)" stroke-width="7"/>
        <circle cx="36" cy="36" r="28" fill="none" stroke="#3b82f6" stroke-width="7"
          stroke-dasharray="0 175.93" stroke-linecap="round" transform="rotate(-90 36 36)" id="progressCircle"/>
        <text x="36" y="41" text-anchor="middle" fill="#1e40af" font-size="14" font-family="Tajawal" font-weight="700" id="progressPct">0%</text>
      </svg>
      <div>
        <p class="htitle">تقدمك في الحفظ</p>
        <p class="hsub" id="masteredSub">حفظت 0 من 98 حكمة</p>
        <p class="hdue" id="dueSub">98 حكمة تنتظر مراجعتك</p>
      </div>
    </div>
    <button class="startbtn" id="startBtn" onclick="startSession()">ابدأ جلسة اليوم ←</button>
    <div class="srow" id="stagesRow"></div>
    <p class="sectitle">كل الحكم (98)</p>
    <div class="hlist" id="hikamList"></div>
  </div>
</div>

<!-- DETAIL SCREEN -->
<div id="screen-detail" class="screen">
  <div class="detsc">
    <button class="backbtn" onclick="showScreen('home')">← رجوع</button>
    <div class="detcard">
      <p class="dettheme" id="detTheme"></p>
      <p class="dettext" id="detText"></p>
      <span class="detbadge" id="detBadge"></span>
    </div>
    <div class="dcard" style="margin-bottom:12px">
      <p class="dlbl">التفسير العميق</p>
      <p class="dtxt" id="detDepth"></p>
    </div>
    <div class="dcard">
      <p class="dlbl">الموقف التطبيقي</p>
      <p class="dtxt" id="detSit" style="font-weight:600;margin-bottom:6px"></p>
      <p class="dtxt" id="detApply"></p>
    </div>
  </div>
</div>

<!-- SESSION SCREEN -->
<div id="screen-session" class="screen">
  <div class="sesc">
    <div class="seshdr">
      <button class="backbtn sm" onclick="showScreen('home')">← الرئيسية</button>
      <span class="sesprog" id="sessProg">1 / 5</span>
      <div class="pgbar"><div class="pgfill" id="pgFill" style="width:0%"></div></div>
    </div>
    <div class="hikcard">
      <span class="hikbadge" id="sessTheme"></span>
      <p class="hiktext" id="sessText"></p>
    </div>
    <div id="quizArea"></div>
  </div>
</div>

<!-- DONE SCREEN -->
<div id="screen-done" class="screen">
  <div class="donesc">
    <div style="font-size:56px">🌊</div>
    <h2 class="donetitle">أتممت جلسة اليوم</h2>
    <p class="donesub">كل جلسة تُقرّب هذه الحكم من طريقة تفكيرك وكلامك لا من ذاكرتك فقط.</p>
    <button class="homebtn" onclick="showScreen('home')">العودة للرئيسية</button>
  </div>
</div>

<script>
const HIKAM = [
  {id:1,text:"لا رأي لمن لا يطاع.",theme:"القيادة",depth:"الرأي بلا سلطة تنفيذية كلام في الهواء — القائد الحقيقي من يملك القدرة على التنفيذ لا فقط الإقناع.",sit:"تُقدّم فكرة في اجتماع ولا أحد يأخذها بجدية",apply:"قبل أن تتكلم — ابنِ مصداقيتك وثقتهم بك أولاً. الرأي يُسمع حين يكون لصاحبه وزن في المجموعة."},
  {id:2,text:"من أعجب برأيه ضل.",theme:"العقل",depth:"الإعجاب بالرأي يُسدل ستاراً على أخطائه — التواضع الفكري شرط الاهتداء.",sit:"تدافع عن رأيك بشدة رغم أدلة المعارضة",apply:"توقف — اسأل نفسك: هل أرفضه لأنه خاطئ فعلاً، أم لأنني لا أريد أن أكون مخطئاً؟ الفرق هو الفارق."},
  {id:3,text:"تبلغ باليسير فكل شيء من الدنيا يؤول إلى انقضاء.",theme:"الحياة",depth:"الاكتفاء بالقليل حكمة لا عجز — كل ما في الدنيا زائل فالتعلق الشديد به وهم مكلف.",sit:"تشعر بضغط شديد لتحقيق المزيد وتعيش في توتر دائم",apply:"اسأل: ما الذي يكفيني فعلاً؟ حدّد حاجتك الحقيقية وتوقف عند بلوغها — ما بعدها رهق بلا غاية."},
  {id:4,text:"صدر العاقل صندوق سره.",theme:"العقل",depth:"العاقل لا يُفشي ما بداخله لكل أحد — سره محمي بعقله لا بقفل.",sit:"صديقك يسألك عن سر خاص لشخص آخر",apply:"قل بهدوء: 'هذا ليس سري أنا.' لا تبرر ولا تعتذر — العاقل صندوق مغلق وكفى."},
  {id:5,text:"ما أضمر أحد شيئاً إلا ظهر في فلتات لسانه وصفحات وجهه.",theme:"اللسان",depth:"الباطن يتسرب رغماً عن صاحبه — لا يمكن إخفاء ما في القلب إلى الأبد.",sit:"تشك في أن شخصاً يُخفي عنك نيته الحقيقية",apply:"لا تواجهه مباشرة — استمع جيداً لهفواته وراقب وجهه. الحقيقة ستظهر من تلقاء نفسها."},
  {id:6,text:"لا تفرح بسقوط غيرك، فإنك لا تدري ما تضمر لك الأيام.",theme:"الحياة",depth:"الشماتة خطأ استراتيجي — الأيام دوّارة وما ينزل بغيرك قد ينزل بك.",sit:"علمت بفشل منافس وشعرت بارتياح داخلي",apply:"الشعور طبيعي لكن لا تُعبّر عنه ولا تبنِ عليه. استبدل الارتياح بتساؤل: ماذا أتعلم من سقوطه؟"},
  {id:7,text:"عقول الناس مدونة في أطراف أقلامهم.",theme:"المعرفة",depth:"ما يكتبه الإنسان هو مرآة تفكيره — اقرأ ما يكتب شخص تعرف حقيقة عقله.",sit:"تريد تقييم شخص قبل الشراكة أو الصداقة",apply:"لا تسأل عنه — اقرأ ما يكتبه ويُشاركه. ما يختار التعبير عنه يخبرك بعقله أكثر من ساعات الحديث."},
  {id:8,text:"واحذر ذوي الخلق اللئام فإنهم في النائبات عليك ممن يخطب، يسعون حول المرء ما طعموا به، وإذا نبا دهر جفول وتغيبوا.",theme:"العلاقات",depth:"أصحاب الأخلاق الدنيئة حاضرون في الرخاء غائبون في الشدة — احذر من تختار.",sit:"صديق كان دائماً معك اختفى حين مررت بأزمة",apply:"هذا كاشف لا مصيبة — الأزمة فرزت لك من هو فعلاً معك. لا تُعاتبه كثيراً، فقط راجع حجمه في حياتك."},
  {id:9,text:"الرغبة إلى الكريم تحركه إلى البذل، وإلى اللئيم تغريه بالطمع.",theme:"العلاقات",depth:"الكرم والبخل طبع لا يتغير بالطلب — اعرف طبيعة من تطلب قبل أن تطلب.",sit:"تحتاج معروفاً وتتردد بين شخصين في طلبه",apply:"اختر الكريم بطبعه لا الثري فقط — الكريم يدفعه طلبك للعطاء، واللئيم يجعلك مديناً له بالذل."},
  {id:10,text:"وألق عدوك بالتحية لا تكن منه زمانك خائفاً تترقب.",theme:"العلاقات",depth:"مواجهة العدو بالتحية تنزع سلاحه وتُريحك من ثقل الخوف والترقب الدائم.",sit:"تتجنب شخصاً تعرف أنه لا يحبك وتشعر بضغط كلما التقيتما",apply:"ابدأه بالسلام بثقة — التحية لا تعني المودة، لكنها تُزيل حدة التوتر وتُريحك أنت قبله."},
  {id:11,text:"أجزر المسيء بثواب المحسن.",theme:"الأخلاق",depth:"أجمل رد على الإساءة هو الإحسان — فيه إرباك للمسيء وارتفاع لصاحبه.",sit:"شخص أساء إليك وتريد رداً مناسباً",apply:"لا ترد الإساءة بمثلها — أحسن إليه في أقرب فرصة. هذا يُربك المسيء ويرفعك أنت في نفس الوقت."},
  {id:12,text:"دع الحرص على الدنيا وفي العيش فلا تطمع، ولا تجمع من المال فلا تدري لمن تجمع.",theme:"الحياة",depth:"الحرص على التجميع وهم مضنٍ — من لا يدري لمن يجمع لا يجمع لنفسه.",sit:"تشعر بهوس التوفير والتجميع حتى على حساب متعة حياتك",apply:"اسأل نفسك: لمن أجمع هذا؟ ما الحد الذي يكفيني؟ عشْ بعضاً مما تجمع — الحياة لا تنتظر."},
  {id:13,text:"آلة السياسة سعة الصدر.",theme:"القيادة",depth:"القائد الذي يضيق بالخلاف لا يصلح للقيادة — الاتساع الداخلي أداته الأولى.",sit:"موظف يعارضك علناً في اجتماع",apply:"لا تقطعه — دعه يكمل. القائد الواسع الصدر يقول: 'شكراً، لنناقش.' المعارضة قد تكون الحل الذي تبحث عنه."},
  {id:14,text:"الناس من خوف الذل في ذل.",theme:"النفس",depth:"الخوف من الذل نفسه ذلٌّ مقيم — الحرية الحقيقية في أن تعيش غير مبالٍ بنظرة الناس.",sit:"تتراجع عن موقف صحيح خوفاً من انتقاد الآخرين",apply:"سؤال واحد: هل سيعيشون عواقب قرارك أم أنت؟ الخوف من رأيهم هو الذل بعينه."},
  {id:15,text:"أعظم الذنوب ما استخف به صاحبه.",theme:"النفس",depth:"الخطر ليس في الذنب وحده — بل في استصغاره، لأن الاستصغار يفتح باب التكرار.",sit:"تؤجل إصلاح عادة سيئة قائلاً في نفسك إنها بسيطة",apply:"كلمة 'بسيطة' هي الخطر بعينه — هي التي تجعلك لا تتركها. عاملها كبيرة الآن قبل أن تكبر فعلاً."},
  {id:16,text:"من كفارات الذنوب العظام إغاثة الملهوف والتنفيس عن المكروب.",theme:"الأخلاق",depth:"الخير العملي يمحو الذنب — نجدة إنسان مكروب أبلغ من ألف استغفار باللسان فقط.",sit:"تشعر بثقل ذنب ولا تعرف كيف تكفّر عنه",apply:"اليوم — ابحث عن شخص يحتاج مساعدة وساعده في صمت دون أن تُخبر أحداً. هذا أبلغ كفارة."},
  {id:17,text:"نعم القرين الرضى.",theme:"النفس",depth:"الرضا لا يعني السكون — بل هو السلام الداخلي الذي لا يسلبه الفقر ولا يمنحه الغنى.",sit:"تشعر بعدم الرضا لأن غيرك يملك ما لا تملكه",apply:"الرضا ليس توقفاً عن التطوير — بل أن تعمل بسلام لا بحسرة. حوّل طاقة المقارنة لخطوة نحو هدفك."},
  {id:18,text:"إذا شئت أن تُقلى فزر متواتراً، وإن شئت أن تزداد حباً فزر غبّاً.",theme:"العلاقات",depth:"التوازن في العلاقات قانون — كثرة الحضور تُفقدك قيمتك، والتوازن يُبقي الشوق.",sit:"تشعر أن صديقاً بدأ يتجنبك رغم أنك تزوره كثيراً",apply:"ابتعد قليلاً — أعطه مساحة. الحضور الدائم يُثقل حتى أعز الناس. الندرة تصنع الشوق."},
  {id:19,text:"كثرة الزيارة تورث الملالة.",theme:"العلاقات",depth:"حتى أعز الناس عليك يحتاج مساحة — الحضور المتواصل يُثقل ولا يُقرّب.",sit:"تلاحظ أن أحداً باتت استجاباته فاترة رغم علاقتكما الجيدة",apply:"قلّل زياراتك أو تواصلك لفترة — قيّم نفسك بالغياب أحياناً. العلاقات تحتاج هواء."},
  {id:20,text:"زيارة الضعفاء من التواضع.",theme:"الأخلاق",depth:"التواضع الحقيقي يظهر في العناية بمن لا يُفيدك — لا بتواضعك أمام الأقوياء.",sit:"تتردد في زيارة شخص مريض أو ضعيف لأنك مشغول",apply:"اذهب — هذه الزيارة أعلى قيمةً من كثير مما تفعله اليوم. التواضع يُقاس بمن تختار أن تكون معهم."},
  {id:21,text:"لا تفش سراً ما استطعت إلى امرئ يفشي إليك سرائر يستودع، فكما تراه بسير غيرك صانعاً فكذا بسيرك لا محالة يصنع.",theme:"العلاقات",depth:"من يُفشي إليك سر غيره سيُفشي سرك لغيرك — القياس هنا منطق لا ظن.",sit:"صديق يُخبرك بأسرار أشخاص آخرين ويطلب منك المشاركة",apply:"لا تشارك — وتذكّر: إن كان يُفشي أسرارهم لك، فهو يُفشي سرك لهم. استبعده من دائرة الثقة."},
  {id:22,text:"ألسنة الحكماء تجود بالعلم، وأفواه الجهال تفيض بالسفه.",theme:"المعرفة",depth:"الكلام كاشف لا خادع — استمع لما يقوله شخص تعرف أين يقف عقله.",sit:"في نقاش ولا تعرف من تُصدّق",apply:"استمع لطريقة الكلام لا فقط لمحتواه — الحكيم يُعلّم ويُوضح، والجاهل يُهاجم ويُعمّم. الأسلوب يكشف."},
  {id:23,text:"احصد الشر من صدر غيرك بقلعه من صدرك.",theme:"العلاقات",depth:"لا تنتظر الآخر يتغير — ابدأ بنفسك والتغيير سيسري.",sit:"علاقة متوترة وتنتظر أن يُبادر الطرف الآخر بالتحسين",apply:"لا تنتظر — أزل ما في صدرك أنت أولاً. الصدور المتصلة تتأثر ببعضها قبل أي كلام."},
  {id:24,text:"فاز من سلم من شر نفسه.",theme:"النفس",depth:"أعدى أعدائك نفسك — من انتصر عليها فاز معركة لا يرى جائزتها كثيرون.",sit:"إغراء أمامك تعرف أنه خطأ لكنك تُبرر لنفسك",apply:"التبرير هو صوت شر النفس — التعرّف عليه نصف الانتصار. قل لنفسك: 'أعرف ما تفعله' ثم اخطُ للوراء."},
  {id:25,text:"الجهاد باب من أبواب الجنة.",theme:"الإيمان",depth:"بذل الجهد في سبيل الحق — سواء كان جهاداً بالنفس أو بالعمل — طريق للفوز الأبدي.",sit:"تشعر بالإحجام عن موقف حق خوفاً من التكلفة",apply:"الحق يحتاج من يقف له ولو وحده — الثمن مؤقت والأجر باقٍ. البذل في الحق باب من أبواب الفوز."},
  {id:26,text:"إن المجاهدين قد باعوا أرواحهم واشتروا الجنة.",theme:"الإيمان",depth:"من يبذل نفسه في الحق فهو أعقل الناس صفقةً — يبيع الفاني ويشتري الباقي.",sit:"تتردد في التضحية بمصلحة شخصية لأجل موقف مبدئي",apply:"اسأل: ما قيمة ما أخسره مقارنة بما أكسبه من كرامة وأجر؟ الصفقة الكبرى دائماً لصالح من بذل."},
  {id:27,text:"ذهب الشباب فما له من عودة، أُوتي المشيب فغين منه المهروب.",theme:"الحياة",depth:"الشباب لا يعود والشيب لا يُهرب منه — التذكير بالزمن دعوة للعمل لا للحزن.",sit:"تشعر بأن الوقت يمر بسرعة وأنك لم تُنجز ما أردت",apply:"لا تُضيع وقتك في الحسرة على الماضي — الآن هو أصغر ما بقي لك. ابدأ خطوة واحدة الآن."},
  {id:28,text:"فعليك تقوى الله فألزمها تفز، إن التقي هو البهي الأهيب.",theme:"الإيمان",depth:"التقوى ليست خوفاً فحسب — بل هي مصدر الهيبة والجمال الحقيقي عند الله والناس.",sit:"تشعر أن التقوى تحدّ من حريتك وتُضيق عليك",apply:"التقوى لا تُضيق — بل تُحرّرك من عبودية الشهوات والخوف من الناس. جرّب الالتزام أسبوعاً وانظر."},
  {id:29,text:"لا طاعة لمخلوق في معصية الخالق.",theme:"الإيمان",depth:"مبدأ التراتبية المطلق — السلطة البشرية تتوقف حيث تبدأ مخالفة الخالق.",sit:"مديرك يطلب منك شيئاً يخالف قيمك الأخلاقية أو دينك",apply:"قل لا بهدوء وثبات: 'لا أستطيع تنفيذ هذا.' السلطة البشرية لها حدود — لا تتنازل عنها."},
  {id:30,text:"إذا قويت فاقوَ على طاعة الله، وإذا ضعفت فاضعف في معصيته.",theme:"الإيمان",depth:"في القوة اصرف طاقتك في الطاعة، وفي الضعف لا تُضف إليه معصية تُثقله.",sit:"تمر بفترة ضعف نفسي وتشعر بميل للانزلاق",apply:"الضعف عذر للتوقف لا للانزلاق — قل لنفسك: 'أنا ضعيف الآن، فلا أزيد ضعفي بمعصية.' هذا يكفي."},
  {id:31,text:"عليكم بطاعة من لا تعذرون جهالته.",theme:"الإيمان",depth:"الله سبحانه لا يُعذر أحد بجهله — طاعته واجبة لأن حججه بلغت كل إنسان.",sit:"تتساهل في واجب ديني بحجة أنك لم تكن تعرف",apply:"ابحث وتعلّم — الجهل المُختار ليس عذراً. طاعة من لا تعذر بجهالته تبدأ بالتعلم لا بالتجاهل."},
  {id:32,text:"الناس أعداء ما جهلوا.",theme:"المعرفة",depth:"العداوة غالباً ليست عداوة شخص — بل عداوة جهل. افهم شيئاً لتقبله.",sit:"زميل يرفض فكرة جديدة بشدة دون أن يفهمها",apply:"لا تُجادله — اشرح له الفكرة بصبر من زاوية تُقرّبها من تجربته. الفهم يُزيل العداوة غالباً."},
  {id:33,text:"أعداؤك ثلاثة: عدوك، وصديق عدوك، وعدو صديقك.",theme:"العلاقات",depth:"الخريطة الاجتماعية للعداوة أوسع مما نظن — العقل يرسمها، والحذر يحميك.",sit:"تتقرب من شخص لا تعرف علاقته بأعدائك",apply:"قبل أن تثق — افهم من يصادق من. صديق عدوك ليس عدوك بالضرورة، لكنه ليس حليفك الآمن."},
  {id:34,text:"لا يجوز القصاص قبل الجناية.",theme:"العدل",depth:"العقوبة تكون على فعل لا على ظن — العدل يبدأ بالإنصاف قبل الحكم.",sit:"تريد معاقبة شخص على نية تظنها فيه لا على فعل وقع",apply:"لا تعاقب على الظن — انتظر الفعل. الحكم المسبق ظلم حتى لو صح الظن لاحقاً."},
  {id:35,text:"لا أعاقب على الظنة.",theme:"العدل",depth:"الظن ليس دليلاً — العدل الحقيقي يرفض العقوبة على الشك.",sit:"تشك في شخص وتريد معاملته بفتور دون دليل واضح",apply:"تعامل معه كما هو حتى يثبت العكس — الشك في قلبك، لكن الفتور في وجهه ظلم مبكر."},
  {id:36,text:"النار أهون من ركوب العار، والعار يدخل أهله في النار.",theme:"الأخلاق",depth:"العار الحقيقي هو التقصير في حق الضعيف المجاور — لا المصيبة التي تنزل من خارج.",sit:"تعلم أن جارك أو قريبك في حاجة ولا تتحرك",apply:"العار الحقيقي أن تنام مكتفياً ومن حولك محتاج — تحرّك الآن ولو بالقليل."},
  {id:37,text:"من نظر في عيب نفسه اشتغل عن عيب غيره.",theme:"النفس",depth:"الانشغال بالنفس علاج للانشغال بالناس — وهو مشغلة لا تنتهي.",sit:"تجد نفسك تنتقد شخصاً آخر في محادثة",apply:"توقف واسأل نفسك سراً: هل هذا العيب موجود فيّ؟ إن كان — اصمت وابدأ بنفسك."},
  {id:38,text:"شر عيوبنا اهتمامنا بعيوب الناس.",theme:"النفس",depth:"الانشغال بعيوب الآخرين هو نفسه عيب — وهو من أشد العيوب لأنه يصرفك عن إصلاح نفسك.",sit:"تجد نفسك في حديث ينتقد الناس ويتتبع أخطاءهم",apply:"اخرج من هذا الحديث أو غيّر موضوعه — كل دقيقة تقضيها في عيوبهم هي دقيقة سرقتها من تحسين نفسك."},
  {id:39,text:"أكبر العيب أن تعيب ما فيك مثله.",theme:"النفس",depth:"نقد الآخرين على ما تفعله أنت هو قمة النفاق — والوعي بذلك أول خطوة للخروج منه.",sit:"تنتقد شخصاً على عيب تعرف في قرارة نفسك أنه فيك",apply:"أوقف الكلام — هذا الانتقاد مرآة لك أنت. ما تكرهه في غيرك يخبرك بما تحتاج إصلاحه في نفسك."},
  {id:40,text:"من نظر في عيوب الناس فأنكرها ثم رضيها لنفسه، فذلك هو الأحمق بعينه.",theme:"النفس",depth:"أن ترى العيب في غيرك وتُنكره ثم تقع فيه — هذا هو الحمق الحقيقي لا قلة الذكاء.",sit:"تنتقد عادة سيئة في شخص ثم تجد نفسك تفعلها",apply:"قف عند هذه اللحظة — لا تبرر. اعترف لنفسك بالتناقض وعالجه. الاعتراف بداية الخروج."},
  {id:41,text:"عيبك مستور ما أسعدك جدك.",theme:"النفس",depth:"ستر العيوب نعمة تحتاج شكراً — لا دليل على عدم وجودها.",sit:"تشعر بالفخر لأن الناس لا يعرفون عيوبك",apply:"لا تعتز بالستر — اعتز بالإصلاح. عيبك المستور نعمة لا مدح، وشكرها أن تعالجه قبل أن يُكشف."},
  {id:42,text:"من أراد الغنى بغير مال، والكثرة بلا عشيرة، فليتحول من ذل المعصية إلى عز الطاعة إلى الله.",theme:"الإيمان",depth:"العز الحقيقي في الطاعة لا في المال — من أراد القوة الداخلية وجدها في الاستقامة.",sit:"تشعر بالضعف والانكسار رغم امتلاكك أشياء كثيرة",apply:"الضعف الداخلي مصدره المعصية لا الفقر — ابحث عن الخلل في علاقتك مع الله لا في رصيدك."},
  {id:43,text:"لا غنى كالعقل، ولا فقر كالجهل، ولا ميراث كالأدب.",theme:"العقل",depth:"ثلاث مقارنات تقلب مفاهيمنا: الثروة الحقيقية في الداخل لا في المال.",sit:"شخص يفتخر بثروته أمامك وأنت في ضائقة مالية",apply:"لا تشعر بنقص — عقلك هو ما سيُخرجك من الضائقة. الغنى الحقيقي هو ما لا يُسرق."},
  {id:44,text:"تفنى اللذاذة ممن نال صفوتها من الحرام ويبقى الإثم والعار.",theme:"الأخلاق",depth:"اللذة الحرام تنتهي واللوم يبقى — العاقل يحسب ما يبقى لا ما يمر.",sit:"تُغري نفسك بفعل محرم لأن لذته الآن أقوى من ألمه لاحقاً",apply:"اسأل نفسك: كم ستمتد اللذة؟ ساعة؟ يوم؟ وكم ستمتد العواقب؟ الجواب الصادق هو قرارك."},
  {id:45,text:"لسان المؤمن من وراء قلبه، وقلب الكافر من وراء لسانه.",theme:"اللسان",depth:"المؤمن يفكر قبل أن يتكلم — والمنافق يتكلم ثم يفكر كيف يبرر ما قال.",sit:"تنجرف في كلام لم تقصده ثم تندم عليه",apply:"قبل كل كلام — توقف ثانية. هل قلبك يقف خلف هذا الكلام؟ إن لم يكن فأغلق فمك."},
  {id:46,text:"المرء بأصغريه: قلبه ولسانه.",theme:"اللسان",depth:"حجمك الحقيقي ليس جسدك — بل ما تحمله في قلبك وما تُخرجه بلسانك.",sit:"تتصرف بطريقة مغايرة لما تؤمن به أمام الناس",apply:"لاحظ هذا التناقض — قلبك يقول شيئاً ولسانك يقول آخر. أيهما تريد أن يمثّلك أمام الناس؟"},
  {id:47,text:"واحفظ لسانك واحترز من لفظه، فالمرء يسلم باللسان ويعطب.",theme:"اللسان",depth:"اللسان سلاح ذو حدين — أكثر الناس هلاكاً كان سببه كلمة لم تُوزن.",sit:"تلقيت رسالة استفزازية وأصابعك على لوحة المفاتيح",apply:"اغلق الهاتف الآن. ما لم تُرسله لا يمكن أن يُستخدم ضدك. عُد إليه بعد ساعة إن أردت."},
  {id:48,text:"لسانك حصانك، إن صنته صانك.",theme:"اللسان",depth:"الحصن يحمي ساكنه — اللسان المصون يحمي صاحبه من أكثر أزماته.",sit:"أنت غاضب وتريد الرد بكلام قاسٍ",apply:"توقف — ما لم يُقل يمكن قوله لاحقاً، أما الذي قيل فلا يُرد. صُن لسانك الآن تَسلم."},
  {id:49,text:"ذهب الوفاء ذهاب أمس الذاهب، فالناس بين مخاتلٍ ومواربٍ.",theme:"العلاقات",depth:"الوفاء نادر في زمن المصالح — العقل لا يعني سوء الظن بالجميع، بل يعني قياس الناس بأفعالهم.",sit:"تشعر بخيانة ممن ظننته وفياً",apply:"لا تُعمّم الخيانة — لكن أعِد حساباتك. الوفاء نادر وكاشفه الفعل لا الكلام."},
  {id:50,text:"الغنى في الغربة وطن، والفقر في الوطن غربة.",theme:"الحياة",depth:"الوطن شعور لا مكان — من يملك ما يكفيه يجد أنساً أينما حل.",sit:"تشعر بالغربة والوحشة في مكان جديد",apply:"ابنِ اكتفاءك المادي والاجتماعي هنا — حين تكتفي بنفسك في هذا المكان ستجد الأنس يأتيك."},
  {id:51,text:"نعم المؤازرة المشاورة.",theme:"القيادة",depth:"الرأي المنفرد أعمى — المشاورة تفتح أبواباً لا يرى صاحب القرار وحده مفاتيحها.",sit:"تواجه قراراً مصيرياً وتريد اتخاذه وحدك",apply:"قبل أن تقرر — اتصل بشخص واحد تثق بحكمه. رأيه لا يلزمك لكنه سيُريك زاوية أعمى عنها."},
  {id:52,text:"أعقل الناس أعذرهم للناس.",theme:"العقل",depth:"العقل يرى الأسباب — والأسباب تُولِّد العذر. من لا يعذر الناس ينقصه فهمهم.",sit:"شخص أساء إليك وتشعر أن المسامحة مستحيلة",apply:"اسأل: ما الضغط أو الجهل الذي جعله يتصرف هكذا؟ ابحث عن عذر يُخرجه من قلبك."},
  {id:53,text:"إذا قدرت على عدوك فاجعل العفو عنه شكراً للقدرة عليه.",theme:"الأخلاق",depth:"العفو من القوة ليس ضعفاً — بل استثمار القدرة في أرفع ما تُستثمر فيه.",sit:"آذاك شخص سابقاً وأنت الآن تملك القدرة على مضايقته",apply:"لا تفعل — اعفُ عنه الآن وأنت في موقع القوة. هذا هو الموقف الذي يُميّز الكبار."},
  {id:54,text:"موت الفتى خير له من قيامه بدار هوان بين واشٍ وحاسد.",theme:"الحياة",depth:"الإقامة في مكان مُهين أشد قسوةً من مشقة السفر — العزة تستحق التضحية.",sit:"تتردد في مغادرة بيئة سامة خوفاً من صعوبة التغيير",apply:"مشقة التغيير مؤقتة — والإقامة في الهوان مرض يومي. الخطوة الأولى أصعب ما فيها."},
  {id:55,text:"لا تصحب في السفر غنياً فإنك إن ساويته في الإنفاق أضر بك.",theme:"العلاقات",depth:"التفاوت الكبير في الإمكانات يُفسد الصحبة — اختر رفيق السفر بعقل لا بالصدفة.",sit:"تتخطط لرحلة مع شخص إمكاناته المادية مختلفة جداً عنك",apply:"تحدّث معه مسبقاً عن التوقعات والتكاليف — أو اختر رفيقاً أكثر تقارباً. الصراحة قبل السفر تحفظ العلاقة."},
  {id:56,text:"خالف نفسك تسترح.",theme:"النفس",depth:"النفس دائماً تميل لما يريحها لا لما يُصلحها — مخالفتها هي طريق الراحة الحقيقية.",sit:"تشعر بكسل شديد عن شيء تعرف أنك ستندم إن أهملته",apply:"قم الآن — النفس ستقاوم وستشكرك بعدها. مخالفتها في البداية هي الاسترحة الحقيقية."},
  {id:57,text:"إن أغنى الغنى العقل، وأكبر الفقر الحمق، وأوحش الوحشة العجب، وأكرم الكرم حسن الخلق.",theme:"العقل",depth:"أربع حقائق تقلب المفاهيم المادية — الغنى عقل، والفقر حمق، والوحشة عُجب، والكرم خُلق.",sit:"تشعر بوحشة رغم أنك محاط بالناس",apply:"الوحشة مع الناس مصدرها العجب — حين تنزل من نفسك ستجد الناس يقتربون. ابدأ بالاهتمام بهم."},
  {id:58,text:"لو كان الفقر رجلاً لقتلته.",theme:"الحياة",depth:"الفقر عدو الكرامة والعقل معاً — الصراحة في وصفه دعوة للسعي الجاد لمحاربته.",sit:"تستسلم للضائقة المالية وتتعامل معها بسلبية",apply:"الفقر عدو يجب محاربته لا القبول به — ضع خطة واحدة اليوم لتحسين وضعك ولو بخطوة صغيرة."},
  {id:59,text:"العفاف زينة الفقر، والشكر زينة الغنى.",theme:"الأخلاق",depth:"لكل حال زينتها — الفقير يتجمل بالعفاف والغني بالشكر، فلا عذر لأحد.",sit:"تشعر بالحرج من وضعك المادي أمام الآخرين",apply:"العفاف كرامتك لا فقرك — احمل قِلّتك بعز. الذين يُعجبهم فقرك المتعفف أكثر ممن يُعجبهم غناك."},
  {id:60,text:"الفقر في الوطن غربة، والغنى في الغربة وطن.",theme:"الحياة",depth:"الانتماء يصنعه الاكتفاء لا الجغرافيا — من يملك ما يكفيه يجد أنساً أينما حل.",sit:"تشعر بالغربة في بلدك بسبب ضائقتك المادية",apply:"الغربة الداخلية تبدأ بالاحتياج — حارب الفقر وستجد أن الأرض من حولك تتسع."},
  {id:61,text:"ثلاث منجيات: خشية الله في السر والعلانية، والقصد في الفقر والغنى، والعدل في الغضب والرضى.",theme:"الإيمان",depth:"ثلاث صفات تُنجي في كل الأحوال — الخشية والاعتدال والعدل.",sit:"تشعر بالضياع ولا تعرف ما الذي يُثبّتك",apply:"عُد لهذه الثلاث: هل تخشى الله في الخلوة؟ هل تقتصد؟ هل تعدل حين تغضب؟ الإجابة الصادقة هي البوصلة."},
  {id:62,text:"برّ الوالدين أن تبذل لهما ما ملكت، وتطيعهما فيما أمراك ما لم يكن معصية.",theme:"العلاقات",depth:"البر عملي لا شعوري — يُقاس بالبذل والطاعة لا بالكلام والمشاعر فقط.",sit:"تشعر أنك بار بوالديك لأنك تحبهم وتتصل بهم",apply:"البر يُقاس بالبذل والطاعة لا بالمشاعر. اسأل: ماذا بذلت لهما هذا الأسبوع فعلاً؟"},
  {id:63,text:"إن تتعب في البر فإن التعب يزول والبر يبقى.",theme:"الأخلاق",depth:"تعب البر مؤقت وأثره دائم — الحساب الصحيح يُقلّل التردد.",sit:"تتعب من خدمة والديك أو ذويك وتشعر بالثقل",apply:"تذكّر: هذا التعب سينتهي والأجر يبقى. وما ستشعر به بعد سنوات حين تتذكر أنك كنت هناك لا يُقدَّر."},
  {id:64,text:"ألا وإن من البلاء الفاقة، وأشد من الفاقة مرض البدن، وأشد من مرض البدن مرض القلب.",theme:"الحياة",depth:"التراتبية في البلاء — الفقر بلاء، والمرض أشد، ومرض القلب أشدها لأنه يُفسد المحرّك الداخلي.",sit:"تشكو من ضائقة مادية وتشعر أنها أصعب ما مررت به",apply:"قارن ببلاء القلب — الكآبة والحقد والوسواس أشد من الفقر. الفقر يؤلم الجسد، ومرض القلب يُميت الروح."},
  {id:65,text:"ألا وإن من النعم سعة المال، وأفضل من سعة المال صحة البدن، وأفضل من صحة البدن تقوى القلب.",theme:"الحياة",depth:"التراتبية في النعم — المال نعمة، والصحة أعلى، والتقوى أعلاها لأنها تحفظ الكل.",sit:"تسعى وراء المال وتُهمل صحتك وتقواك",apply:"رتّب أولوياتك — المال بلا صحة عبء، والصحة بلا تقوى خطر. اعمل للكل لكن بترتيب صحيح."},
  {id:66,text:"من نسي خطيئته استعظم خطيئة غيره.",theme:"النفس",depth:"النسيان الانتقائي يجعلنا قضاةً ظالمين — من يتذكر خطأه يُخفف حكمه على غيره.",sit:"تنتقد شخصاً بشدة على خطأ وقع فيه",apply:"قبل أن تُكمل — تذكّر خطأً مشابهاً وقعت فيه أنت. إن وجدته، خفّف حكمك."},
  {id:67,text:"ثواب الآخرة خير من نعيم الدنيا.",theme:"الإيمان",depth:"المقارنة بين المؤقت والدائم — من أدرك هذا تغيرت أولوياته كلياً.",sit:"تُقدم على قرار فيه تفريط بمبدأ مقابل مكسب سريع",apply:"اسأل: بعد سنة من الآن، أيهما سأندم على تركه؟ المبدأ أو المكسب؟ الجواب هو قرارك."},
  {id:68,text:"عجبت لمن يقنط ومعه الاستغفار.",theme:"الإيمان",depth:"القنوط مع وجود الاستغفار جهل — باب التوبة مفتوح ما دام العبد حياً.",sit:"تشعر باليأس من تغيير حالك أو من المغفرة",apply:"استغفر الآن — مرة واحدة بصدق. اليأس مع وجود هذا الباب المفتوح ليس منطقاً، بل هو وسواس."},
  {id:69,text:"ظن العاقل أصح من ظن الجاهل.",theme:"العقل",depth:"الظن المبني على خبرة وتجربة وعلم أقرب للحقيقة — العقل يُحسّن الاستنتاج.",sit:"تتردد بين رأيك ورأي شخص أكثر خبرة",apply:"اسمع لمن يملك خبرة أعمق — ظن العاقل المجرّب أصح من قناعتك المبنية على قراءة محدودة."},
  {id:70,text:"الحظ يأتي من لا يأتيه.",theme:"الحياة",depth:"الحظ يأتي حين تتوقف عن مطاردته — الانشغال بالعمل الصادق يجلب ما لا تتوقع.",sit:"تُقارن حظك بحظ الآخرين وتشعر بالإحباط",apply:"توقف عن مطاردة الحظ وانشغل بعملك — الحظ يجد أصحابه حين يكونون منشغلين لا حين ينتظرونه."},
  {id:71,text:"عاتب أخاك بالإحسان إليه وارد شره بالإنعام عليه.",theme:"العلاقات",depth:"الإحسان سلاح أقوى من العتاب — يُصلح العلاقة ويُخزي المسيء في آنٍ واحد.",sit:"صديق يجرحك بكلامه ولا تعرف كيف ترد",apply:"بدل أن تعاتبه — أحسن إليه في أقرب فرصة. الإحسان يُقيّده ويُحرجه أكثر من أي كلام."},
  {id:72,text:"إنما الفخر لعقل ثابت وحياء وعفاف وأدب.",theme:"الأخلاق",depth:"الفخر الحقيقي في القيم لا في المظاهر — العقل والحياء والعفاف والأدب هي التاج الحقيقي.",sit:"تفتخر بمظهرك أو مالك أو مكانتك أمام الآخرين",apply:"سؤال: ما الذي ستأخذه معك حين تموت؟ المال والمظهر يبقيان هنا. العقل والأدب هما تاجك الحقيقي."},
  {id:73,text:"قُرِنت الهيبة بالخيبة، والحياء بالحرمان.",theme:"النفس",depth:"من يخشى الرفض لن يطلب، ومن يخجل لن ينال — الحياء جميل لكنه يكلف أحياناً.",sit:"تتردد في طلب حقك أو فرصتك خجلاً أو خوفاً من الرفض",apply:"الرفض أسوأ ما سيحدث — وهو أفضل من الندم على عدم المحاولة. اطلب وتقبّل أي جواب."},
  {id:74,text:"إن الكريم إذا حباك بموعدٍ أعطاكه سلساً بغير مطال.",theme:"العلاقات",depth:"الكريم لا يُماطل في وعده — الوعد عند الكرماء دَيْن يُؤدَّى لا وعد يُنسى.",sit:"شخص وعدك بشيء ويتأخر ويعتذر مراراً",apply:"التأخر المتكرر كاشف للطبع لا للظرف — راجع ثقتك فيه. الكريم يُوفي بلا مطل."},
  {id:75,text:"التوبة اسم يقع على ستة أشياء: على الماضي من الذنوب الندامة، ولتضييع الفرائض الإعادة، ورد المظالم.",theme:"الإيمان",depth:"التوبة الحقيقية ليست كلمة — بل ستة أفعال متكاملة تُعيد بناء النفس من الداخل.",sit:"تقول 'تبت' بلسانك لكنك تعود لنفس الذنب",apply:"التوبة بلا أثر عملي ليست توبة — راجع الستة: هل تندم فعلاً؟ هل رددت المظالم؟ هل عوّضت الفرائض؟"},
  {id:76,text:"استنزلوا الرزق بالصدقة.",theme:"الإيمان",depth:"الصدقة ليست خسارة — بل مفتاح لرزق لا تراه. القانون الإلهي في العطاء يُعاكس منطق الكنز.",sit:"تمر بضائقة مالية وتتردد في الصدقة خوفاً من النقص",apply:"أعطِ ولو قليلاً الآن — الصدقة في الضيق أعظم أجراً وأسرع أثراً. جرّب وراقب."},
  {id:77,text:"من تبصّر في الفطنة تبيّنت له الحكمة.",theme:"المعرفة",depth:"الفطنة بوابة الحكمة — من دقّق نظره في الأمور استخلص منها ما يُرشد.",sit:"تواجه موقفاً غامضاً ولا تعرف كيف تتصرف",apply:"تمهّل — تبصّر في تفاصيل الموقف قبل أن تتصرف. الحكمة لا تُعجّل، بل تنظر ثم تقرر."},
  {id:78,text:"لا تضعوا الحكمة في غير أهلها فتظلموها، ولا تمنعوها أهلها فتظلموهم.",theme:"المعرفة",depth:"الحكمة أمانة — وضعها عند من لا يستحق إهدار لها، ومنعها عمن يستحق ظلم له.",sit:"تتردد في مشاركة رأي أو علم مع شخص ما",apply:"اقرأ أهليته أولاً — هل سيقدر هذا الرأي أم يسيء استخدامه؟ الحكمة تُعطى لمن يحملها."},
  {id:79,text:"رُبَّ يومٍ بكيت منه فلما صرت في غيره بكيت عليه.",theme:"الحياة",depth:"ما تظنه مصيبة اليوم قد يكون نعمة غداً — الزمن يُعيد رسم قيمة الأيام.",sit:"تمر بيوم صعب وتشعر أنه لن ينتهي",apply:"تذكّر أياماً صعبة سابقة تشتاق إليها الآن — هذا اليوم الصعب سيكون يوماً ما ذكرى تبكي عليها."},
  {id:80,text:"الإيمان معرفة بالقلب وإقرار باللسان وعمل بالأركان.",theme:"الإيمان",depth:"الإيمان ثلاثي الأبعاد — لا يكتمل بعنصر واحد دون الآخرين.",sit:"تشعر أن إيمانك مجرد معتقد لا يؤثر في سلوكك",apply:"الإيمان لا يكتمل بالقلب وحده — ابحث عن الجوانب الناقصة: هل الإقرار واضح؟ هل العمل حاضر؟"},
  {id:81,text:"وإذا رأيت الرزق ضاق ببلدة وخشيت فيها أن يضيق لا مكسب، فارحل فأرض الله واسعة.",theme:"الحياة",depth:"الهجرة في طلب الرزق فضيلة لا هرب — الأرض واسعة ولا عذر للتقوقع في الضيق.",sit:"تخاف ترك مكانك رغم أن فرصك فيه ضيقة",apply:"الأرض واسعة والرزق فيها — الخوف من التغيير طبيعي لكنه ليس سبباً كافياً للبقاء في الضيق."},
  {id:82,text:"إن حياً يرى الصلاح فساداً أو يرى الغي في الأمور رشاداً لقريب من الهلاك.",theme:"العقل",depth:"انقلاب الموازين في العقل علامة خطر — من يرى الحق باطلاً والباطل حقاً فقد الميزان.",sit:"تجد نفسك تُبرر أمراً خاطئاً وتقنع من حولك بأنه صواب",apply:"توقف — حين تجد نفسك تعمل جاهداً لإقناع الآخرين بأن الخطأ صواب، فهذا إنذار خطر. راجع نفسك."},
  {id:83,text:"واتقوا الله عباد الله وبادروا آجالكم بأعمالكم، فإن الله لم يخلقكم عبثاً.",theme:"الإيمان",depth:"العمر محدود والحساب قادم — المبادرة بالعمل قبل الأجل مسؤولية لا خيار.",sit:"تؤجل الأعمال الصالحة والمهمة قائلاً إن الوقت لا يزال أمامك",apply:"الأجل لا يُعلَن مسبقاً — ما تؤجله اليوم قد لا تجد غداً. بادر بخطوة واحدة الآن."},
  {id:84,text:"مكارم الأخلاق عشر: صدق اللسان، وصدق البأس، وإعطاء السائل، وحسن الخلق، والمكافأة بالصنائع، وصلة الرحم.",theme:"الأخلاق",depth:"مكارم الأخلاق قائمة محددة لا مجرد شعور — كل منها يُبنى بالتدريب والنية.",sit:"تريد تحسين أخلاقك لكن لا تعرف من أين تبدأ",apply:"اختر واحدة من هذه الست الآن — اعمل عليها أسبوعاً. الأخلاق تُبنى بالممارسة لا بالتمني."},
  {id:85,text:"ولا تقيمن بدار لا انتفاع بها، فالأرض واسعة والرزق مبسوط.",theme:"الحياة",depth:"الإقامة في مكان لا ينفعك خسارة مضاعفة — تخسر الوقت والفرصة معاً.",sit:"تبقى في وظيفة أو مكان لا يُفيدك لمجرد الراحة النفسية من المألوف",apply:"المألوف ليس سبباً كافياً للبقاء — سؤال واحد: هل هذا المكان يُقرّبك من أهدافك أم يُبعدك؟"},
  {id:86,text:"لعمرك ما الإنسان إلا بدينه، فلا تترك التقوى اتكالاً على النسب.",theme:"الإيمان",depth:"قيمة الإنسان في دينه لا في نسبه — التاريخ أثبت أن الانتماء الأسمى هو الانتماء للحق.",sit:"تشعر بالعلو على آخرين بسبب نسبك أو أصلك",apply:"سلمان الفارسي أعلى من أبي لهب القرشي — قيمتك بعملك وتقواك لا بنسبك. راجع مصدر اعتزازك."},
  {id:87,text:"التقوى هي الخوف من الجليل، والعمل بالتنزيل، والقناعة بالقليل، والاستعداد ليوم الرحيل.",theme:"الإيمان",depth:"أربعة أركان للتقوى — خوف قلبي، وعمل جوارحي، وزهد نفسي، واستعداد دائم.",sit:"تسأل نفسك إن كنت فعلاً تقياً",apply:"ضعها على الأربعة: هل تخشى الله في الخلوة؟ هل تعمل بما أُنزل؟ هل تقنع بالقليل؟ هل تستعد للرحيل؟"},
  {id:88,text:"دولة الباطل ساعة، ودولة الحق حتى قيام الساعة.",theme:"الحياة",depth:"الظلم قد يبدو غالباً — لكن الزمن ليس في صفه. الصبر على الحق استثمار في الأبد.",sit:"ترى متملقاً يُكافأ ومخلصاً يُتجاهل في بيئتك",apply:"لا تغيّر منهجك — سجلّك الحقيقي يُبنى الآن. دولة الباطل ساعة — واصل."},

const STAGES = ["جديدة","تعلّم","مراجعة","محفوظة"];
const COLORS  = ["#94a3b8","#f59e0b","#3b82f6","#10b981"];
const C = 2*Math.PI*28; // circumference

let progress = {};
let dark = false;
let sessionQueue = [];
let sessIdx = 0;
let quizType = "";

function initProgress() {
  const base = {};
  HIKAM.forEach(h => base[h.id] = {stage:0, nextReview:0});
  return base;
}

function loadProgress() {
  try {
    const s = localStorage.getItem("hikam-v4");
    const base = initProgress();
    progress = s ? {...base, ...JSON.parse(s)} : base;
  } catch { progress = initProgress(); }
}

function saveProgress() {
  try { localStorage.setItem("hikam-v4", JSON.stringify(progress)); } catch {}
}

function getMastered() { return HIKAM.filter(h => progress[h.id]?.stage === 3).length; }
function getDue() { return HIKAM.filter(h => { const p=progress[h.id]; return p.stage<3||Date.now()>=p.nextReview; }); }

function toggleDark() {
  dark = !dark;
  document.body.classList.toggle("dk", dark);
  document.getElementById("dkbtn").textContent = dark ? "☀️" : "🌙";
}

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-"+name).classList.add("active");
  if (name === "home") renderHome();
}

function renderHome() {
  const mastered = getMastered();
  const due = getDue();
  const pct = Math.round((mastered/HIKAM.length)*100);
  const circ = (mastered/HIKAM.length)*C;

  document.getElementById("progressCircle").setAttribute("stroke-dasharray", `${circ} ${C}`);
  document.getElementById("progressPct").textContent = pct+"%";
  document.getElementById("masteredSub").textContent = `حفظت ${mastered} من ${HIKAM.length} حكمة`;
  document.getElementById("dueSub").textContent = `${due.length} حكمة تنتظر مراجعتك`;
  document.getElementById("masteredPill").textContent = `${mastered} / ${HIKAM.length} محفوظة`;

  const startBtn = document.getElementById("startBtn");
  startBtn.disabled = due.length === 0;
  startBtn.textContent = due.length > 0 ? "ابدأ جلسة اليوم ←" : "عُد غداً ✓";

  // Stages row
  const stagesRow = document.getElementById("stagesRow");
  stagesRow.innerHTML = STAGES.map((s,i) => {
    const cnt = HIKAM.filter(h => progress[h.id]?.stage === i).length;
    return `<div class="schip"><span class="sdot" style="background:${COLORS[i]}"></span><span class="sname">${s}</span><span class="scnt">${cnt}</span></div>`;
  }).join("");

  // List
  const list = document.getElementById("hikamList");
  list.innerHTML = HIKAM.map(h => {
    const stage = progress[h.id]?.stage || 0;
    return `<div class="hrow" onclick="showDetail(${h.id})">
      <span class="hrdot" style="background:${COLORS[stage]}"></span>
      <div class="hrbody">
        <p class="hrtext">${h.text}</p>
        <p class="hrmeta">${h.theme} · ${STAGES[stage]}</p>
      </div>
      <span class="hrarr">›</span>
    </div>`;
  }).join("");
}

function showDetail(id) {
  const h = HIKAM.find(x=>x.id===id);
  const p = progress[h.id];
  document.getElementById("detTheme").textContent = h.theme;
  document.getElementById("detText").textContent = h.text;
  document.getElementById("detDepth").textContent = h.depth;
  document.getElementById("detSit").textContent = h.sit;
  document.getElementById("detApply").textContent = h.apply;
  const badge = document.getElementById("detBadge");
  badge.textContent = STAGES[p.stage];
  badge.style.background = COLORS[p.stage]+"22";
  badge.style.color = COLORS[p.stage];
  showScreen("detail");
}

function startSession() {
  const due = getDue();
  if (!due.length) return;
  sessionQueue = due.slice(0,5);
  sessIdx = 0;
  renderSession();
  showScreen("session");
}

function renderSession() {
  const cur = sessionQueue[sessIdx];
  if (!cur) { showScreen("done"); return; }

  const TYPES = ["blank","explain","situation"];
  quizType = TYPES[cur.id % 3];

  document.getElementById("sessProg").textContent = `${sessIdx+1} / ${sessionQueue.length}`;
  document.getElementById("pgFill").style.width = `${(sessIdx/sessionQueue.length)*100}%`;
  document.getElementById("sessTheme").textContent = cur.theme;

  const sessText = document.getElementById("sessText");
  if (quizType === "blank") {
    sessText.textContent = "— سؤال إكمال الفراغ —";
    sessText.className = "hiktext muted";
  } else {
    sessText.textContent = cur.text;
    sessText.className = "hiktext";
  }

  renderQuiz(cur, quizType);
}

function renderQuiz(hikma, type) {
  const area = document.getElementById("quizArea");
  if (type === "blank") {
    const words = hikma.text.replace(/[،.؟!..]/g,"").split(" ").filter(w=>w.length>1);
    const bi = Math.floor(Math.random()*words.length);
    const ans = words[bi];
    area.innerHTML = `
      <div class="qbox">
        <p class="qlbl">أكمل الكلمة الناقصة</p>
        <p class="qtext" id="blankText">${words.map((w,i)=>i===bi?`<span class="blank" id="blankSpan">_____</span> `:`${w} `).join("")}</p>
        <div class="row" id="blankInput">
          <input class="qinp" id="blankInp" placeholder="اكتب الكلمة الناقصة..." autofocus/>
          <button class="qbtn" onclick="checkBlank('${ans}')">تحقق</button>
        </div>
        <div class="rarea" id="blankResult" style="display:none"></div>
      </div>`;
    document.getElementById("blankInp").addEventListener("keydown", e => {
      if (e.key==="Enter" && document.getElementById("blankInp").value.trim()) checkBlank(ans);
    });
  } else if (type === "explain") {
    area.innerHTML = `
      <div class="qbox">
        <p class="qlbl">اشرح هذه الحكمة بكلماتك</p>
        <textarea class="qtxt" id="explainTxt" rows="3" placeholder="ما فهمك لها؟ كيف تراها في الحياة؟"></textarea>
        <button class="qbtn" onclick="showExplain()">قارن بالتفسير</button>
        <div class="rarea" id="explainResult" style="display:none">
          <div class="dcard"><p class="dlbl">التفسير العميق</p><p class="dtxt">${hikma.depth}</p></div>
          ${fbBtns()}
        </div>
      </div>`;
  } else {
    area.innerHTML = `
      <div class="qbox">
        <p class="qlbl">كيف تطبّق هذه الحكمة في هذا الموقف؟</p>
        <div class="sitbox"><span class="sitlbl">الموقف: </span>${hikma.sit}</div>
        <textarea class="qtxt" id="sitTxt" rows="2" placeholder="فكّر في التطبيق العملي..."></textarea>
        <button class="qbtn" onclick="showSit()">اكتشف التطبيق</button>
        <div class="rarea" id="sitResult" style="display:none">
          <div class="dcard"><p class="dlbl">التطبيق العملي</p><p class="dtxt">${hikma.apply}</p></div>
          ${fbBtns()}
        </div>
      </div>`;
  }
}

function fbBtns() {
  return `<div class="row">
    <button class="fb easy" onclick="handleResult('easy')">سهلة — تقدّم 🟢</button>
    <button class="fb hard" onclick="handleResult('hard')">صعبة — راجع 🔴</button>
  </div>`;
}

function checkBlank(ans) {
  const inp = document.getElementById("blankInp").value.trim();
  const ok = inp === ans;
  document.getElementById("blankInput").style.display = "none";
  const res = document.getElementById("blankResult");
  res.style.display = "flex";
  res.style.flexDirection = "column";
  res.style.gap = "11px";
  res.innerHTML = `<p class="${ok?"rok":"rno"}">${ok?"✓ أحسنت!":"✗ الكلمة: "+ans}</p>${fbBtns()}`;
}

function showExplain() {
  const txt = document.getElementById("explainTxt").value.trim();
  document.querySelector("#quizArea .qbtn").style.display="none";
  document.getElementById("explainTxt").style.display="none";
  const res = document.getElementById("explainResult");
  if (txt) {
    res.innerHTML = `<div class="dcard user"><p class="dlbl">فكرتك</p><p class="dtxt">${txt}</p></div>` + res.innerHTML;
  }
  res.style.display = "flex";
  res.style.flexDirection = "column";
  res.style.gap = "11px";
}

function showSit() {
  const txt = document.getElementById("sitTxt").value.trim();
  document.querySelector("#quizArea .qbtn").style.display="none";
  document.getElementById("sitTxt").style.display="none";
  const res = document.getElementById("sitResult");
  if (txt) {
    res.innerHTML = `<div class="dcard user"><p class="dlbl">فكرتك</p><p class="dtxt">${txt}</p></div>` + res.innerHTML;
  }
  res.style.display = "flex";
  res.style.flexDirection = "column";
  res.style.gap = "11px";
}

function handleResult(result) {
  const cur = sessionQueue[sessIdx];
  const ivs = [0, 60000, 600000, 86400000];
  const p = progress[cur.id];
  const ns = result==="easy" ? Math.min(p.stage+1,3) : Math.max(p.stage-1,0);
  progress[cur.id] = {stage:ns, nextReview:Date.now()+ivs[ns]};
  saveProgress();
  sessIdx++;
  if (sessIdx >= sessionQueue.length) { showScreen("done"); return; }
  renderSession();
}

// Init
loadProgress();
renderHome();

// تسجيل Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .catch(() => {});
  });
}
</script>
</body>
